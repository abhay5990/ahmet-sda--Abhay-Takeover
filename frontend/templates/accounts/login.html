{% extends "base_public.html" %}

{% block title %}Login - Inventory Manager{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-900 text-center mb-6">Inventory Manager</h1>
        <p class="text-gray-500 text-center mb-8">Sign in to your account</p>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" id="username" required autofocus
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 px-3 py-2 border">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="password" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 px-3 py-2 border">
            </div>
            <button type="submit"
                class="w-full bg-emerald-600 text-white py-2 px-4 rounded-md hover:bg-emerald-700 font-medium transition">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
