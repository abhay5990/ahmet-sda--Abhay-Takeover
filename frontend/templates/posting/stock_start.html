{% extends "base.html" %}

{% block title %}Start Stock Posting — Inventory Manager{% endblock %}

{% block content %}
<div x-data="stockStart()" x-init="init()">

    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Start Stock Posting</h1>
    </div>

    <div class="max-w-5xl space-y-4">

        <!-- Game Selection (searchable) -->
        <div class="bg-white rounded-lg shadow p-4" x-data="{ gameSearch: '', gameOpen: false }" @click.outside="gameOpen = false">
            <label class="block text-sm font-medium text-gray-700 mb-2">Game</label>
            <div class="relative">
                <input type="text" x-model="gameSearch"
                       @focus="gameOpen = true"
                       @input="gameOpen = true"
                       :placeholder="selectedGame ? GAME_NAMES[selectedGame] : 'Type to search...'"
                       class="w-full border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
                <div x-show="gameOpen" x-transition
                     class="absolute z-20 mt-1 w-full bg-white border border-gray-200 rounded-md shadow-lg max-h-60 overflow-y-auto">
                    {% for game in games %}
                    <button type="button"
                            x-show="'{{ game.name }}'.toLowerCase().includes(gameSearch.toLowerCase())"
                            @click="selectedGame = '{{ game.id }}'; gameSearch = ''; gameOpen = false; onGameChange()"
                            class="w-full text-left px-3 py-2 text-sm hover:bg-emerald-50 hover:text-emerald-700 transition-colors"
                            :class="selectedGame === '{{ game.id }}' && 'bg-emerald-50 text-emerald-700 font-medium'">
                        {{ game.name }}
                    </button>
                    {% endfor %}
                    <div x-show="!GAME_LIST.some(g => g.name.toLowerCase().includes(gameSearch.toLowerCase()))"
                         class="px-3 py-2 text-sm text-gray-400">No games found</div>
                </div>
                <div x-show="selectedGame && !gameOpen" class="absolute inset-y-0 right-0 flex items-center pr-2">
                    <button type="button" @click="selectedGame = ''; gameSearch = ''; onGameChange()"
                            class="text-gray-400 hover:text-gray-600">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p x-show="selectedGame" class="mt-1 text-xs text-emerald-600" x-text="GAME_NAMES[selectedGame]"></p>
        </div>

        <!-- Everything below requires game selection -->
        <template x-if="selectedGame">
            <div class="space-y-4">

        <!-- Method Toggle -->
        <div class="bg-white rounded-lg shadow p-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Method</label>
            <div class="flex space-x-4">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" value="account" x-model="sourceType"
                           class="text-emerald-600 focus:ring-emerald-500">
                    <span class="text-sm text-gray-700">Platform Import</span>
                </label>
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" value="manual" x-model="sourceType"
                           class="text-emerald-600 focus:ring-emerald-500">
                    <span class="text-sm text-gray-700">Manual Entry</span>
                </label>
                <label x-show="hasSheetMode" class="flex items-center space-x-2 cursor-pointer">
                    <input type="radio" :value="isR6Game ? 'r6_sheet' : 'sheet'" x-model="sourceType"
                           class="text-emerald-600 focus:ring-emerald-500">
                    <span class="text-sm text-gray-700">Google Sheet</span>
                </label>
            </div>
        </div>

        <!-- Platform Import mode -->
        <template x-if="sourceType === 'account'">
            <div class="space-y-4">
                {% if source_accounts %}
                <div class="bg-white rounded-lg shadow p-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Source Account</label>
                    <select x-model="sourceAccountId"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
                        <option value="">None (no fallback)</option>
                        {% for acc in source_accounts %}
                        <option value="{{ acc.id }}" {% if forloop.first %}selected{% endif %}>{{ acc.name }} ({{ acc.provider }})</option>
                        {% endfor %}
                    </select>
                    <p class="mt-1 text-xs text-gray-500">
                        If OwnedProduct is not found, it will be fetched via API from this account
                    </p>
                </div>
                {% endif %}

                <div class="bg-white rounded-lg shadow p-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Logins <span class="text-gray-400">(one per line)</span>
                    </label>
                    <textarea x-model="logins" rows="6" placeholder="Enter logins, one per line..."
                              class="w-full border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 font-mono text-sm"></textarea>
                    <p class="mt-1 text-xs text-gray-500">
                        <span x-text="loginCount"></span> login(s) entered
                    </p>
                </div>
            </div>
        </template>

        <!-- Manual Entry mode -->
        <template x-if="sourceType === 'manual'">
            <div class="space-y-4">

                <!-- ===== LISTING INFO + GAME DATA (grouped) ===== -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <!-- Listing Info -->
                    <div class="p-4">
                        <label class="block text-sm font-medium text-gray-700 mb-3">Listing Info</label>
                        <div class="space-y-3">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Title</label>
                                    <input type="text" x-model="manualTitle"
                                           class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                           placeholder="Auto-generated if empty">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Purchased Price *</label>
                                    <div class="flex items-center space-x-1">
                                        <span class="text-sm text-gray-400">$</span>
                                        <input type="number" step="0.01" min="0" x-model.number="manualPurchasedPrice"
                                               class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 w-40"
                                               placeholder="0.00">
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Description</label>
                                <textarea x-model="manualDescription" rows="4"
                                          class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                          placeholder="Auto-generated if empty"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Game Data (Dynamic fields from ManualFieldRegistry) -->
                    <div x-show="!isGtaGame && manualFieldSpecs.length > 0" class="border-t border-gray-200 p-4 bg-gray-50">
                        <template x-for="group in manualFieldGroups" :key="group">
                            <div class="mb-4 last:mb-0">
                                <label x-show="group" class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-2" x-text="group"></label>
                                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                    <template x-for="spec in manualScalarFieldsByGroup(group)" :key="spec.key">
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">
                                                <span x-text="spec.label"></span>
                                                <span x-show="spec.required" class="text-red-400">*</span>
                                            </label>
                                            <!-- text -->
                                            <template x-if="spec.type === 'text'">
                                                <input type="text" x-model="manualFields[spec.key]"
                                                       class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                                       :placeholder="spec.help_text || ''">
                                            </template>
                                            <!-- number -->
                                            <template x-if="spec.type === 'number'">
                                                <input type="number" :min="spec.min_value ?? 0" x-model.number="manualFields[spec.key]"
                                                       class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                                       placeholder="0">
                                            </template>
                                            <!-- select -->
                                            <template x-if="spec.type === 'select'">
                                                <select x-model="manualFields[spec.key]"
                                                        class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
                                                    <option value="">Select...</option>
                                                    <template x-for="opt in spec.options" :key="opt.value">
                                                        <option :value="opt.value" x-text="opt.label"></option>
                                                    </template>
                                                </select>
                                            </template>
                                            <!-- boolean -->
                                            <template x-if="spec.type === 'boolean'">
                                                <label class="flex items-center space-x-2 cursor-pointer mt-1">
                                                    <input type="checkbox" x-model="manualFields[spec.key]"
                                                           class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                                                    <span class="text-xs text-gray-600" x-text="spec.label"></span>
                                                </label>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                                <!-- multiselect: tag-style toggle buttons (separate row) -->
                                <template x-for="spec in manualMultiselectFieldsByGroup(group)" :key="'ms-' + spec.key">
                                    <div class="mt-3">
                                        <label class="block text-xs text-gray-500 mb-1.5" x-text="spec.label"></label>
                                        <div class="flex flex-wrap gap-2">
                                            <template x-for="opt in spec.options" :key="opt.value">
                                                <button type="button" @click="toggleManualFieldTag(spec.key, opt.value)"
                                                        class="px-2.5 py-1 text-xs font-medium rounded-full border transition-colors"
                                                        :class="(manualFields[spec.key] || []).includes(opt.value)
                                                            ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
                                                            : 'bg-white text-gray-600 border-gray-300 hover:border-gray-400'"
                                                        x-text="opt.label"></button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Game Data (GTA-specific, connected via border) -->
                    <div x-show="isGtaGame" class="border-t border-gray-200 p-4 bg-gray-50">
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Game Data</label>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Platform *</label>
                                <select x-model="manualPlatform"
                                        @change="credentials = []"
                                        class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
                                    <option value="">Select...</option>
                                    <template x-for="p in platformOptions" :key="p">
                                        <option :value="p" x-text="p"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Level</label>
                                <input type="number" min="0" x-model.number="manualLevel"
                                       class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                       placeholder="0">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Cash Amount</label>
                                <div class="flex space-x-1">
                                    <input type="number" min="0" x-model.number="manualCashAmount"
                                           class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                           placeholder="0">
                                    <select x-model="manualCashUnit"
                                            class="text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500">
                                        <option value="Million">M</option>
                                        <option value="Billion">B</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Cars Count</label>
                                <input type="number" min="0" x-model.number="manualCarsCount"
                                       class="w-full text-sm border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500"
                                       placeholder="0">
                            </div>
                        </div>
                        <!-- Account Tags -->
                        <div class="mt-3">
                            <label class="block text-xs text-gray-500 mb-1.5">Account Tags</label>
                            <div class="flex flex-wrap gap-2">
                                <template x-for="tag in GTA_ACCOUNT_TAGS" :key="tag">
                                    <button type="button" @click="toggleTag(tag)"
                                            class="px-2.5 py-1 text-xs font-medium rounded-full border transition-colors"
                                            :class="manualAccountTags.includes(tag)
                                                ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
                                                : 'bg-white text-gray-600 border-gray-300 hover:border-gray-400'"
                                            x-text="tag"></button>
                                </template>
                            </div>
                        </div>
                        <!-- Dual Characters -->
                        <div class="mt-3">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" x-model="manualHasDualCharacters"
                                       class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                                <span class="text-xs text-gray-600">Has Dual Characters</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- ===== CREDENTIALS ===== -->
                <div class="bg-white rounded-lg shadow p-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Credentials</label>
                    <template x-if="credentialSpec">
                        <p class="text-xs text-gray-500 mb-2">
                            Paste tab-separated data. Columns (in order):
                            <template x-for="(col, i) in credentialSpec" :key="col.key">
                                <code class="bg-gray-100 px-1 rounded" x-text="col.label"></code>
                            </template>
                        </p>
                    </template>
                    <template x-if="!credentialSpec">
                        <p class="text-xs text-gray-500 mb-2">
                            Paste tab-separated data from Excel. Columns auto-detected:
                            <code class="bg-gray-100 px-1 rounded">login  password</code> +
                            optional <code class="bg-gray-100 px-1 rounded">email  email_pass  email_link  birthday</code>
                        </p>
                    </template>
                    <textarea x-model="pasteData" @paste="handlePaste($event)" rows="4"
                              :placeholder="credentialSpec
                                  ? 'Paste tab-separated: ' + credentialSpec.map(c => c.label).join(' \\t ')
                                  : 'Paste tab-separated data here (login\\tpassword\\t...)\\nColumns are auto-detected by content'"
                              class="w-full border-gray-300 rounded-md shadow-sm focus:ring-emerald-500 focus:border-emerald-500 font-mono text-xs"></textarea>
                    <div class="flex items-center space-x-3 mt-2">
                        <button @click="parsePaste()" type="button"
                                class="px-3 py-1.5 bg-gray-600 text-white text-xs font-medium rounded hover:bg-gray-700">
                            Parse
                        </button>
                        <button @click="addEmptyRow()" type="button"
                                class="px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-medium rounded hover:bg-gray-200 border">
                            + Add Row
                        </button>
                        <span class="text-xs text-gray-500" x-text="credentials.length + ' credential(s)'"></span>
                    </div>
                </div>

                <!-- Credential Table (dynamic columns) -->
                <div class="bg-white rounded-lg shadow overflow-x-auto" x-show="credentials.length > 0">
                    <table class="min-w-full text-xs">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="px-2 py-2 text-left text-gray-500 font-medium">#</th>
                                <template x-for="col in credentialColumns" :key="col.key">
                                    <th class="px-2 py-2 text-left text-gray-500 font-medium" x-text="col.label"></th>
                                </template>
                                <th class="px-2 py-2"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(cred, idx) in credentials" :key="idx">
                                <tr class="border-b hover:bg-gray-50" :class="{'bg-red-50': !cred[credentialColumns[0].key] || !cred[credentialColumns[1].key]}">
                                    <td class="px-2 py-1 text-gray-400" x-text="idx + 1"></td>
                                    <template x-for="(col, colIdx) in credentialColumns" :key="col.key">
                                        <td class="px-1 py-1">
                                            <input type="text" x-model="cred[col.key]"
                                                   @paste.prevent="handleCellPaste($event, idx, colIdx)"
                                                   class="w-24 text-xs border-gray-300 rounded px-1 py-0.5">
                                        </td>
                                    </template>
                                    <td class="px-1 py-1">
                                        <button @click="credentials.splice(idx, 1)" type="button"
                                                class="text-red-400 hover:text-red-600">
                                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                            </svg>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <!-- ===== DISTRIBUTION (grouped) ===== -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <!-- Distribution Mode -->
                    <div class="p-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Distribution</label>
                        <div class="flex space-x-4">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" value="cross_platform" x-model="distributionMode"
                                       class="text-emerald-600 focus:ring-emerald-500">
                                <span class="text-sm text-gray-700">Cross-platform</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" value="shared" x-model="distributionMode"
                                       class="text-emerald-600 focus:ring-emerald-500">
                                <span class="text-sm text-gray-700">Shared</span>
                            </label>
                        </div>
                        <p class="mt-1 text-xs text-gray-500" x-show="distributionMode === 'cross_platform'">
                            Same credentials posted to all selected stores. When sold on one, removed from others.
                        </p>
                        <p class="mt-1 text-xs text-gray-500" x-show="distributionMode === 'shared'">
                            Different credentials assigned to different stores. Specify count per store.
                        </p>
                    </div>

                    <!-- Shared Distribution counts (connected via border) -->
                    <div x-show="distributionMode === 'shared' && selectedStores.length > 0 && credentials.length > 0"
                         class="border-t border-gray-200 p-4 bg-gray-50">
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">
                            Per-Store Allocation
                            <span class="normal-case text-gray-400 ml-1">
                                (Total: <span x-text="credentials.length"></span>, Assigned: <span x-text="totalDistributed"></span>)
                            </span>
                        </label>
                        <div class="space-y-2">
                            {% for store in stores %}
                            <div class="flex items-center space-x-3" x-show="selectedStores.includes('{{ store.id }}')">
                                <span class="text-sm text-gray-700 w-40">{{ store.name }}</span>
                                <input type="number" min="0" :max="credentials.length"
                                       x-model.number="distribution['{{ store.slug }}']"
                                       class="w-20 text-sm border-gray-300 rounded-md">
                                <span class="text-xs text-gray-400">credentials</span>
                            </div>
                            {% endfor %}
                        </div>
                        <p class="mt-2 text-xs text-red-500" x-show="totalDistributed > credentials.length">
                            Total distributed exceeds credential count!
                        </p>
                    </div>
                </div>

            </div>
        </template>

        <!-- Google Sheet mode (Fortnite) -->
        <template x-if="sourceType === 'sheet'">
            <div class="space-y-4">
                <div class="bg-white rounded-lg shadow p-4">
                    <label class="block text-sm font-medium text-gray-700 mb-3">Google Sheet — Fortnite Manual</label>
                    <p class="text-xs text-gray-500 mb-4">
                        Enter your Google Sheet ID or URL, choose a worksheet name, then prepare the sheet and fill in account data.
                    </p>

                    <!-- Spreadsheet ID / Link -->
                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-600 mb-1">Spreadsheet ID or Link</label>
                        <input type="text" x-model="sheetSpreadsheetInput"
                               placeholder="https://docs.google.com/spreadsheets/d/... or just the ID"
                               class="w-full border-gray-300 rounded-md shadow-sm text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    </div>

                    <!-- Sheet (worksheet) name -->
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-600 mb-1">Worksheet Name</label>
                        <input type="text" x-model="sheetWorksheetName"
                               placeholder="FORTNITE MANUAL"
                               class="w-full border-gray-300 rounded-md shadow-sm text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    </div>

                    <div class="flex items-center space-x-3">
                        <button @click="prepareFortniteSheet()" type="button"
                                :disabled="sheetLoading || !sheetSpreadsheetInput.trim()"
                                class="px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-md hover:bg-emerald-700 disabled:opacity-50 transition-colors">
                            <span x-show="!sheetLoading">Prepare Sheet</span>
                            <span x-show="sheetLoading">Preparing...</span>
                        </button>
                        <button @click="fetchSheetAccounts()" type="button"
                                :disabled="sheetFetching || (!sheetSpreadsheetId && !sheetSpreadsheetInput.trim())"
                                class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 disabled:opacity-50 transition-colors">
                            <span x-show="!sheetFetching">Fetch Accounts</span>
                            <span x-show="sheetFetching">Fetching...</span>
                        </button>
                    </div>

                    <!-- Sheet URL display -->
                    <template x-if="sheetUrl">
                        <p class="mt-3 text-xs text-gray-500">
                            Sheet: <a :href="sheetUrl" target="_blank" class="text-emerald-600 underline" x-text="sheetUrl"></a>
                        </p>
                    </template>
                    <!-- Success message -->
                    <template x-if="sheetSuccess">
                        <p class="mt-3 text-xs text-emerald-600" x-text="sheetSuccess"></p>
                    </template>
                    <!-- Errors -->
                    <template x-if="sheetError">
                        <p class="mt-3 text-xs text-red-600" x-text="sheetError"></p>
                    </template>
                </div>

                <!-- Fetched accounts preview -->
                <template x-if="sheetAccounts.length > 0">
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="p-4 border-b bg-gray-50 flex items-center justify-between">
                            <span class="text-sm font-medium text-gray-700">
                                Fetched Accounts: <span class="text-emerald-600" x-text="sheetAccounts.length"></span>
                            </span>
                            <button @click="sheetAccounts = []" type="button"
                                    class="text-xs text-gray-500 hover:text-red-600">Clear</button>
                        </div>
                        <div class="max-h-64 overflow-y-auto">
                            <table class="min-w-full text-xs">
                                <thead class="bg-gray-50 border-b sticky top-0">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">#</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Mail</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Platform</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Title</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Price</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Items</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    <template x-for="(acc, idx) in sheetAccounts" :key="idx">
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-3 py-1.5 text-gray-400" x-text="idx + 1"></td>
                                            <td class="px-3 py-1.5 font-mono" x-text="acc.mail"></td>
                                            <td class="px-3 py-1.5" x-text="acc.platforms.join('/')"></td>
                                            <td class="px-3 py-1.5 max-w-xs truncate" x-text="acc.title"></td>
                                            <td class="px-3 py-1.5 text-emerald-700" x-text="'$' + acc.sales_price"></td>
                                            <td class="px-3 py-1.5 text-gray-500" x-text="acc.parsed_items.outfits + ' outfits'"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <!-- Sheet fetch errors -->
                        <template x-if="sheetFetchErrors.length > 0">
                            <div class="p-3 border-t bg-red-50">
                                <p class="text-xs font-medium text-red-700 mb-1">Errors:</p>
                                <ul class="text-xs text-red-600 space-y-0.5">
                                    <template x-for="err in sheetFetchErrors" :key="err">
                                        <li x-text="err"></li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- R6 Tracker Sheet mode -->
        <template x-if="sourceType === 'r6_sheet'">
            <div class="space-y-4">
                <div class="bg-white rounded-lg shadow p-4">
                    <label class="block text-sm font-medium text-gray-700 mb-3">Google Sheet — R6 Tracker Import</label>
                    <p class="text-xs text-gray-500 mb-4">
                        Enter your Google Sheet ID or URL, choose a worksheet name, then prepare the sheet and fill in account data with TrackerLink URLs.
                    </p>

                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-600 mb-1">Spreadsheet ID or Link</label>
                        <input type="text" x-model="sheetSpreadsheetInput"
                               placeholder="https://docs.google.com/spreadsheets/d/... or just the ID"
                               class="w-full border-gray-300 rounded-md shadow-sm text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-medium text-gray-600 mb-1">Worksheet Name</label>
                        <input type="text" x-model="sheetWorksheetName"
                               placeholder="R6 TRACKER"
                               class="w-full border-gray-300 rounded-md shadow-sm text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    </div>

                    <div class="flex items-center space-x-3">
                        <button @click="prepareR6Sheet()" type="button"
                                :disabled="sheetLoading || !sheetSpreadsheetInput.trim()"
                                class="px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-md hover:bg-emerald-700 disabled:opacity-50 transition-colors">
                            <span x-show="!sheetLoading">Prepare Sheet</span>
                            <span x-show="sheetLoading">Preparing...</span>
                        </button>
                        <button @click="fetchR6Accounts()" type="button"
                                :disabled="sheetFetching || (!sheetSpreadsheetId && !sheetSpreadsheetInput.trim())"
                                class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 disabled:opacity-50 transition-colors">
                            <span x-show="!sheetFetching">Fetch Accounts</span>
                            <span x-show="sheetFetching">Fetching...</span>
                        </button>
                    </div>

                    <template x-if="sheetUrl">
                        <p class="mt-3 text-xs text-gray-500">
                            Sheet: <a :href="sheetUrl" target="_blank" class="text-emerald-600 underline" x-text="sheetUrl"></a>
                        </p>
                    </template>
                    <template x-if="sheetSuccess">
                        <p class="mt-3 text-xs text-emerald-600" x-text="sheetSuccess"></p>
                    </template>
                    <template x-if="sheetError">
                        <p class="mt-3 text-xs text-red-600" x-text="sheetError"></p>
                    </template>
                </div>

                <!-- Fetched R6 accounts preview -->
                <template x-if="sheetAccounts.length > 0">
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="p-4 border-b bg-gray-50 flex items-center justify-between">
                            <span class="text-sm font-medium text-gray-700">
                                Fetched Accounts: <span class="text-emerald-600" x-text="sheetAccounts.length"></span>
                            </span>
                            <button @click="sheetAccounts = []" type="button"
                                    class="text-xs text-gray-500 hover:text-red-600">Clear</button>
                        </div>
                        <div class="max-h-64 overflow-y-auto">
                            <table class="min-w-full text-xs">
                                <thead class="bg-gray-50 border-b sticky top-0">
                                    <tr>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">#</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Mail</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Tracker UUID</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Price</th>
                                        <th class="px-3 py-2 text-left text-gray-500 font-medium">Title</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    <template x-for="(acc, idx) in sheetAccounts" :key="idx">
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-3 py-1.5 text-gray-400" x-text="idx + 1"></td>
                                            <td class="px-3 py-1.5 font-mono" x-text="acc.mail"></td>
                                            <td class="px-3 py-1.5 font-mono text-gray-500" x-text="acc.tracker_uuid ? acc.tracker_uuid.substring(0, 8) + '...' : '-'"></td>
                                            <td class="px-3 py-1.5 text-emerald-700" x-text="acc.sales_price ? '$' + acc.sales_price : (acc.price || '-')"></td>
                                            <td class="px-3 py-1.5 max-w-xs truncate text-gray-500" x-text="acc.title || '(auto from tracker)'"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <template x-if="sheetFetchErrors.length > 0">
                            <div class="p-3 border-t bg-red-50">
                                <p class="text-xs font-medium text-red-700 mb-1">Errors:</p>
                                <ul class="text-xs text-red-600 space-y-0.5">
                                    <template x-for="err in sheetFetchErrors" :key="err">
                                        <li x-text="err"></li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- ===== POSTING IMAGE (job-level, capabilities-driven) ===== -->
        <div x-show="selectedGame && mediaCapabilities.supports_override" class="bg-white rounded-lg shadow p-4">
            <label class="block text-sm font-medium text-gray-700 mb-3">
                Posting Image
                <span x-show="isImageOptional || canAutoGenerateMedia" class="ml-1 text-xs font-normal text-gray-400">(Optional)</span>
            </label>
            <div class="flex flex-wrap items-center gap-3">
                <!-- Auto Generated option (manual mode only) -->
                <button x-show="canAutoGenerateMedia" type="button"
                        @click="selectedImagePresetId = 'auto'"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg border-2 text-sm transition-all"
                        :class="selectedImagePresetId === 'auto'
                            ? 'border-emerald-500 bg-emerald-50 text-emerald-700'
                            : 'border-gray-200 text-gray-600 hover:border-gray-300'">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/>
                    </svg>
                    Auto Generated
                </button>

                <!-- Selected image preview (when a preset is selected) -->
                <template x-if="selectedImagePresetId !== 'auto' && selectedImagePresetId !== ''">
                    <div class="flex items-center gap-2 px-2 py-1.5 rounded-lg border-2 border-emerald-500 bg-emerald-50">
                        <img :src="previewImageUrl" class="w-10 h-10 rounded object-cover" alt="">
                        <span class="text-xs font-medium text-emerald-700 max-w-[120px] truncate" x-text="previewImageLabel"></span>
                        <button type="button" @click="selectedImagePresetId = defaultImageSelection()"
                                class="ml-1 text-gray-400 hover:text-red-500 transition-colors" title="Remove selection">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </template>

                <!-- Choose from Gallery button -->
                <button type="button" @click="imageGalleryOpen = true"
                        class="flex items-center gap-2 px-3 py-2 rounded-lg border-2 border-dashed text-sm transition-all"
                        :class="!isImageOptional && !canAutoGenerateMedia && selectedImagePresetId === ''
                            ? 'border-amber-300 bg-amber-50 text-amber-700'
                            : 'border-gray-300 text-gray-600 hover:border-emerald-400 hover:bg-emerald-50'">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
                    </svg>
                    Choose from Gallery
                    <span class="text-[10px] text-gray-400" x-text="'(' + imagePresets.length + '/50)'"></span>
                </button>
            </div>
            <span class="text-xs text-gray-400 mt-2 block" x-show="imageLoading">Loading saved images...</span>
            <p x-show="imageError" class="mt-2 text-xs text-red-600" x-text="imageError"></p>
            <p x-show="isImageOptional && selectedImagePresetId === '' && !imageLoading"
               class="mt-2 text-xs text-gray-500">Optional — if not selected, the platform's default image behavior will be used.</p>
            <p x-show="canAutoGenerateMedia && selectedImagePresetId === 'auto' && !imageLoading"
               class="mt-2 text-xs text-gray-500">Image will be auto-generated. You can optionally pick one from the gallery to override it.</p>
            <p x-show="!isImageOptional && !canAutoGenerateMedia && selectedImagePresetId === '' && !imageLoading"
               class="mt-2 text-xs text-amber-600">No image selected. Choose one from the gallery or upload a new one.</p>

            <!-- Hidden file input -->
            <input x-ref="imageInput" type="file" accept="image/png,image/jpeg,image/webp" class="hidden" @change="uploadImage($event)">
        </div>

        <!-- ===== IMAGE GALLERY MODAL ===== -->
        <template x-teleport="body">
            <div x-show="imageGalleryOpen" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50"
                 @keydown.escape.window="imageGalleryOpen = false">
                <div @click.outside="imageGalleryOpen = false"
                     class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col">
                    <!-- Modal header -->
                    <div class="flex items-center justify-between px-5 py-4 border-b">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900">Image Gallery</h3>
                            <p class="text-xs text-gray-500 mt-0.5" x-text="imagePresets.length + ' of 50 images'"></p>
                        </div>
                        <button @click="imageGalleryOpen = false" class="text-gray-400 hover:text-gray-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Modal body -->
                    <div class="p-5 overflow-y-auto flex-1">
                        <div class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                            <!-- Upload tile -->
                            <button type="button"
                                    @click="$refs.imageInput.click()"
                                    :disabled="imageUploading || imagePresets.length >= 50"
                                    class="relative flex flex-col items-center justify-center h-32 rounded-lg border-2 border-dashed bg-white transition-all disabled:opacity-40"
                                    :class="imageUploading ? 'border-gray-300' : 'border-gray-300 hover:border-emerald-400 hover:bg-emerald-50'">
                                <template x-if="!imageUploading">
                                    <div class="flex flex-col items-center">
                                        <svg class="w-8 h-8 text-gray-400 mb-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                                        </svg>
                                        <span class="text-xs font-medium text-gray-600">Upload</span>
                                        <span class="text-[10px] text-gray-400 mt-0.5">PNG, JPEG, WebP</span>
                                        <span class="text-[10px] text-gray-400">Max 100 MB</span>
                                    </div>
                                </template>
                                <template x-if="imageUploading">
                                    <div class="flex flex-col items-center">
                                        <svg class="w-6 h-6 text-emerald-500 animate-spin mb-1.5" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                        </svg>
                                        <span class="text-xs text-gray-500">Uploading...</span>
                                    </div>
                                </template>
                            </button>

                            <!-- Preset tiles -->
                            <template x-for="preset in imagePresets" :key="preset.id">
                                <div class="relative h-32 rounded-lg border-2 overflow-hidden bg-gray-100 transition-all group cursor-pointer"
                                     @click="selectedImagePresetId = String(preset.id); imageGalleryOpen = false"
                                     :class="selectedImagePresetId === String(preset.id)
                                         ? 'border-emerald-500 ring-2 ring-emerald-100 shadow-sm'
                                         : 'border-gray-200 hover:border-gray-300'">
                                    <img :src="preset.url" :alt="preset.name || 'Saved Image'"
                                         class="absolute inset-0 w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                                    <span class="absolute left-0 right-0 bottom-0 text-white text-[10px] font-medium px-2 py-1.5 truncate"
                                          x-text="preset.name || 'Saved Image'"></span>
                                    <!-- Size badge -->
                                    <span x-show="preset.size_bytes"
                                          class="absolute top-1.5 left-1.5 bg-black/50 text-white text-[9px] px-1.5 py-0.5 rounded"
                                          x-text="preset.size_bytes > 1048576 ? (preset.size_bytes / 1048576).toFixed(1) + ' MB' : (preset.size_bytes / 1024).toFixed(0) + ' KB'"></span>
                                    <!-- Checkmark -->
                                    <div x-show="selectedImagePresetId === String(preset.id)"
                                         class="absolute top-1.5 right-1.5 w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center">
                                        <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                                        </svg>
                                    </div>
                                    <!-- Delete button -->
                                    <button type="button"
                                            @click.stop="deleteImagePreset(preset.id)"
                                            class="absolute top-1.5 right-1.5 w-5 h-5 bg-red-500 rounded-full items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity"
                                            :class="selectedImagePresetId === String(preset.id) ? 'hidden' : 'flex'"
                                            title="Delete image">
                                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                </div>
                            </template>
                        </div>
                        <p x-show="imagePresets.length === 0 && !imageLoading" class="text-center text-sm text-gray-400 mt-6">
                            No images yet. Upload one to get started.
                        </p>
                        <span class="text-xs text-gray-400 mt-3 block" x-show="imageLoading">Loading saved images...</span>
                        <p x-show="imageError" class="mt-2 text-xs text-red-600" x-text="imageError"></p>
                    </div>
                </div>
            </div>
        </template>

        <!-- Store Selection -->
        <div class="bg-white rounded-lg shadow p-4">
            <label class="block text-sm font-medium text-gray-700 mb-3">Stores</label>
            <div class="space-y-2">
                {% for store in stores %}
                <div class="border rounded-md"
                     :class="!isStoreSupported('{{ store.provider }}') ? 'opacity-50' : ''">
                    <div class="flex items-center justify-between p-3">
                        <label class="flex items-center space-x-3"
                               :class="isStoreSupported('{{ store.provider }}') ? 'cursor-pointer' : 'cursor-not-allowed'">
                            <input type="checkbox" value="{{ store.id }}"
                                   x-model="selectedStores"
                                   @change="onStoreToggle('{{ store.slug }}')"
                                   :disabled="!isStoreSupported('{{ store.provider }}')"
                                   class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500 disabled:opacity-50">
                            <span class="text-sm font-medium"
                                  :class="isStoreSupported('{{ store.provider }}') ? 'text-gray-700' : 'text-gray-400'">{{ store.name }}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full
                                {% if store.provider == 'gameboost' %}bg-blue-100 text-blue-700
                                {% elif store.provider == 'eldorado' %}bg-yellow-100 text-yellow-700
                                {% elif store.provider == 'playerauctions' %}bg-purple-100 text-purple-700
                                {% else %}bg-gray-100 text-gray-700{% endif %}">
                                {{ store.get_provider_display }}
                            </span>
                            <span x-show="selectedGame && !isStoreSupported('{{ store.provider }}')"
                                  class="text-xs text-red-400">Not supported</span>
                        </label>
                        <button @click="toggleSettings('{{ store.slug }}')"
                                x-show="selectedStores.includes('{{ store.id }}')"
                                class="text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Pricing Settings (collapsible) -->
                    <div x-show="showSettings['{{ store.slug }}']" x-collapse
                         class="border-t px-3 pb-3 pt-2 bg-gray-50">
                        {% if store.provider == 'playerauctions' %}
                        <!-- PA Posting Mode -->
                        <div class="mb-3">
                            <label class="block text-xs font-medium text-purple-700 mb-1">Posting Mode</label>
                            <div class="flex space-x-4">
                                <label class="flex items-center space-x-1.5 cursor-pointer">
                                    <input type="radio" value="bulk"
                                           x-model="defaults['{{ store.slug }}'].pa_mode"
                                           class="text-purple-600 focus:ring-purple-500">
                                    <span class="text-sm text-gray-700">Bulk (Excel)</span>
                                </label>
                                <label class="flex items-center space-x-1.5 cursor-pointer">
                                    <input type="radio" value="single"
                                           x-model="defaults['{{ store.slug }}'].pa_mode"
                                           class="text-purple-600 focus:ring-purple-500">
                                    <span class="text-sm text-gray-700">Single (API)</span>
                                </label>
                            </div>
                            <p class="mt-1 text-xs text-gray-400"
                               x-show="defaults['{{ store.slug }}'].pa_mode === 'single'">
                                Level 0 accounts require single post mode
                            </p>
                        </div>
                        {% endif %}
                        <!-- Content Templates -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3"
                             x-show="templatesByMarketplace['{{ store.provider }}']?.title?.length || templatesByMarketplace['{{ store.provider }}']?.description?.length">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Title Template</label>
                                <select x-model="defaults['{{ store.slug }}'].title_template_id"
                                        class="w-full text-sm border-gray-300 rounded-md">
                                    <option :value="null">Legacy (auto-generated)</option>
                                    <template x-for="t in (templatesByMarketplace['{{ store.provider }}']?.title || [])" :key="t.id">
                                        <option :value="t.id" x-text="t.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Description Template</label>
                                <select x-model="defaults['{{ store.slug }}'].description_template_id"
                                        class="w-full text-sm border-gray-300 rounded-md">
                                    <option :value="null">Legacy (auto-generated)</option>
                                    <template x-for="t in (templatesByMarketplace['{{ store.provider }}']?.description || [])" :key="t.id">
                                        <option :value="t.id" x-text="t.name"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                        <!-- Pricing -->
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Low (&le;$10)</label>
                                <input type="number" step="0.01"
                                       x-model="defaults['{{ store.slug }}'].multiplier_low"
                                       :disabled="sheetHasSalesPrice"
                                       :class="sheetHasSalesPrice ? 'bg-gray-100 cursor-not-allowed' : ''"
                                       class="w-full text-sm border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Mid ($10-$100)</label>
                                <input type="number" step="0.01"
                                       x-model="defaults['{{ store.slug }}'].multiplier_mid"
                                       :disabled="sheetHasSalesPrice"
                                       :class="sheetHasSalesPrice ? 'bg-gray-100 cursor-not-allowed' : ''"
                                       class="w-full text-sm border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">High (&gt;$100)</label>
                                <input type="number" step="0.01"
                                       x-model="defaults['{{ store.slug }}'].multiplier_high"
                                       :disabled="sheetHasSalesPrice"
                                       :class="sheetHasSalesPrice ? 'bg-gray-100 cursor-not-allowed' : ''"

        <!-- Submit -->
        <div class="space-y-3">
            <div class="flex items-center space-x-4">
                <button @click="submitJob()" :disabled="!canSubmit || submitting"
                        class="px-6 py-2.5 bg-emerald-600 text-white text-sm font-medium rounded-lg
                               hover:bg-emerald-700 focus:ring-2 focus:ring-emerald-500
                               disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    <span x-show="!submitting">Start Posting</span>
                    <span x-show="submitting">Submitting...</span>
                </button>
<p x-show="submitError" class="text-sm text-red-600" x-text="submitError"></p>
            </div>
        </div>

</div>
