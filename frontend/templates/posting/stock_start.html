{% block extra_js %}
<script>
// Game slug -> supported variants (mirrors backend GameVariant registry)
const GAME_VARIANTS = {{ game_variants_json|safe }};

// Game ID -> supported marketplace providers (from GamePlatformMapping)
const GAME_PROVIDERS = {{ game_providers_json|safe }};

// Game ID -> slug lookup
const GAME_SLUGS = {
    {% for game in games %}'{{ game.id }}': '{{ game.slug }}',{% endfor %}
};

// Game ID -> name lookup
const GAME_NAMES = {
    {% for game in games %}'{{ game.id }}': '{{ game.name }}',{% endfor %}
};
const GAME_LIST = [
    {% for game in games %}{ id: '{{ game.id }}', name: '{{ game.name }}' },{% endfor %}
];

// Store ID -> name lookup
const STORE_NAMES = {
    {% for store in stores %}'{{ store.id }}': '{{ store.name }}',{% endfor %}
};

// GTA V platform options
const GTA_PLATFORMS = [
    'PC - Legacy', 'PlayStation 4', 'Xbox One',
    'PlayStation 5', 'Xbox Series X/S', 'PC - Enhanced',
];

// GTA V account tags (GameBoost expected values)
const GTA_ACCOUNT_TAGS = [
    'High Level Account', 'Billionaire Account', 'Rare Account', 'Starter Account',
];

// ── Platform-aware credential column specs ──
// Each entry: { key: field name in credential object, label: display header }
const _EMAIL_CHAIN = [
    { key: 'email', label: 'Email' },
    { key: 'email_password', label: 'Email Pass' },
    { key: 'email_login_link', label: 'Email Link' },
];
const _SEC_EMAIL_CHAIN = [
    { key: 'security_email', label: 'Sec. Email' },
    { key: 'security_email_password', label: 'Sec. Email Pass' },
    { key: 'security_email_login_link', label: 'Sec. Email Link' },
];

const GTA_CREDENTIAL_SPECS = {
    'PlayStation 4': [
        { key: 'psn_id', label: 'PSN ID' }, { key: 'psn_pass', label: 'PSN Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
        { key: 'dob', label: 'DoB' },
    ],
    'PlayStation 5': [
        { key: 'psn_id', label: 'PSN ID' }, { key: 'psn_pass', label: 'PSN Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
        { key: 'dob', label: 'DoB' },
    ],
    'Xbox One': [
        { key: 'xbox_id', label: 'Xbox ID' }, { key: 'xbox_pass', label: 'Xbox Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
    ],
    'Xbox Series X/S': [
        { key: 'xbox_id', label: 'Xbox ID' }, { key: 'xbox_pass', label: 'Xbox Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
    ],
    'PC - Legacy': [
        { key: 'steam_id', label: 'Steam ID' }, { key: 'steam_pass', label: 'Steam Pass' },
        { key: 'rock_id', label: 'Rock ID' }, { key: 'rock_pass', label: 'Rock Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
    ],
    'PC - Enhanced': [
        { key: 'steam_id', label: 'Steam ID' }, { key: 'steam_pass', label: 'Steam Pass' },
        { key: 'rock_id', label: 'Rock ID' }, { key: 'rock_pass', label: 'Rock Pass' },
        ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
    ],
};

// Default (non-GTA) column spec
const DEFAULT_CREDENTIAL_SPEC = [
    { key: 'login', label: 'Login *' }, { key: 'password', label: 'Password *' },
    ..._EMAIL_CHAIN, ..._SEC_EMAIL_CHAIN,
    { key: 'birthday', label: 'Birthday' },
];

// Date pattern: digits with / or - separators (e.g. 3/10/1989, 1989-03-10, 10.03.1989)
const DATE_RE = /^\d{1,4}[\/.\\-]\d{1,2}[\/.\\-]\d{1,4}$/;
// URL/domain pattern (e.g. firstmail.ltd/webmail, https://outlook.com)
const LINK_RE = /^(https?:\/\/)?[a-z0-9.-]+\.[a-z]{2,}/i;

/**
 * Get the credential column spec for the current context.
 * For GTA games with a platform selected, returns platform-specific columns.
 * Otherwise returns the default auto-detect columns.
 */
function getCredentialSpec(platform) {
    return GTA_CREDENTIAL_SPECS[platform] || null;
}

/**
 * Parse tab-separated cells using a platform-specific column spec.
 * Columns are positional (1:1 mapping with spec), then a validation
 * pass fixes obvious misplacements (e.g. date in a non-date field).
 */
function parseBySpec(cells, spec) {
    const cred = {};
    for (const col of spec) cred[col.key] = '';
    for (let i = 0; i < Math.min(cells.length, spec.length); i++) {
        cred[spec[i].key] = cells[i].trim();
    }

    // Post-parse fix: if a date-like value ended up in a non-date field,
    // move it to the 'dob' column (if spec has one and it's empty).
    const dobCol = spec.find(c => c.key === 'dob');
    if (dobCol && !cred.dob) {
        for (const col of spec) {
            if (col.key === 'dob') continue;
            if (cred[col.key] && DATE_RE.test(cred[col.key])) {
                cred.dob = cred[col.key];
                cred[col.key] = '';
                break;
            }
        }
    }
    return cred;
}

/**
 * Auto-detect column mapping for a row of tab-separated cells (default/non-GTA).
 * First two columns are always login, password.
 * Remaining columns detected by content:
 *   - contains @ -> email (1st) / security_email (2nd)
 *   - matches DATE_RE -> birthday
 *   - matches LINK_RE -> email_login_link (1st) / security_email_login_link (2nd)
 *   - otherwise -> email_password (1st) / security_email_password (2nd)
 */
function detectColumns(cells) {
    const cred = emptyCredential();
    if (cells.length >= 1) cred.login = cells[0].trim();
    if (cells.length >= 2) cred.password = cells[1].trim();

    let emailSeen = false;
    let emailPassSeen = false;
    let emailLinkSeen = false;

    for (let i = 2; i < cells.length; i++) {
        const val = cells[i].trim();
        if (!val) continue;

        if (DATE_RE.test(val)) {
            cred.birthday = val;
        } else if (val.includes('@')) {
            if (!emailSeen) { cred.email = val; emailSeen = true; }
            else { cred.security_email = val; }
        } else if (LINK_RE.test(val)) {
            if (!emailLinkSeen) { cred.email_login_link = val; emailLinkSeen = true; }
            else { cred.security_email_login_link = val; }
        } else {
            if (!emailPassSeen) { cred.email_password = val; emailPassSeen = true; }
            else { cred.security_email_password = val; }
        }
    }
    return cred;
}

function emptyCredential() {
    return {
        login: '', password: '', email: '', email_password: '', email_login_link: '',
        security_email: '', security_email_password: '', security_email_login_link: '',
        birthday: '',
    };
}

function emptyCredentialForSpec(spec) {
    const cred = {};
    for (const col of spec) cred[col.key] = '';
    return cred;
}

function stockStart() {
    return {
        selectedGame: new URLSearchParams(window.location.search).get('game') || '',
        sourceType: 'account',
        // Account mode
        logins: (new URLSearchParams(window.location.search).get('logins') || '').replace(/,/g, '\n'),
        sourceAccountId: new URLSearchParams(window.location.search).get('source') || '{% if source_accounts %}{{ source_accounts.0.id }}{% endif %}',
        // Manual mode — listing info
        manualTitle: '',
        manualDescription: '',
        manualPurchasedPrice: 0,
        // Manual mode — game data (GTA-specific legacy)
        manualPlatform: '',
        manualLevel: 0,
        manualCashAmount: 0,
        manualCashUnit: 'Million',
        manualCarsCount: 0,
        manualAccountTags: [],
        manualHasDualCharacters: false,
        // Manual mode — dynamic game fields (non-GTA)
        manualFieldSpecs: [],
        manualFields: {},
        selectedImagePresetId: '',
        imagePresets: [],
        imageLoading: false,
        imageUploading: false,
        imageError: '',
        mediaCapabilities: { auto_generate_manual: false, supports_override: true },
        imageGalleryOpen: false,
        // Manual mode — Create Pool option
        createPoolEnabled: false,
        poolName: '',
        poolTargetCount: 5,
        poolThreshold: 2,
        // Manual mode — credentials & distribution
        distributionMode: 'cross_platform',
        credentials: [],
        pasteData: '',
        distribution: {},
        // Sheet mode (Fortnite)
        sheetSpreadsheetInput: '',
        sheetSpreadsheetId: '',
        sheetWorksheetName: 'FORTNITE MANUAL',
        sheetLoading: false,
        sheetFetching: false,
        sheetUrl: '',
        sheetError: '',
        sheetSuccess: '',
        sheetAccounts: [],
        sheetFetchErrors: [],
        // Shared
        selectedStores: [],
        defaults: {},
        showSettings: {},
        templatesByMarketplace: {},  // { marketplace: { title: [...], description: [...] } }
        submitting: false,
        submitError: '',

        get sheetHasSalesPrice() {
            if ((this.sourceType !== 'sheet' && this.sourceType !== 'r6_sheet') || this.sheetAccounts.length === 0) return false;
            return this.sheetAccounts.some(a => a.sales_price && a.sales_price > 0);
        },

        get loginCount() {
            return this.logins.split('\n').filter(l => l.trim()).length;
        },

        get credentialSpec() {
            if (this.isGtaGame && this.manualPlatform) {
                return getCredentialSpec(this.manualPlatform);
            }
            return null;
        },

        get credentialColumns() {
            return this.credentialSpec || DEFAULT_CREDENTIAL_SPEC;
        },

        get canSubmit() {
            if (!this.selectedGame || this.selectedStores.length === 0) return false;
            if (this.sourceType === 'account') {
                return this.loginCount > 0;
            }
            if (this.sourceType === 'sheet' || this.sourceType === 'r6_sheet') {
                return this.sheetAccounts.length > 0;
            }
            // Manual mode
            if (this.isGtaGame && !this.manualPlatform) return false;
            // Validate required dynamic fields
            if (!this.isGtaGame) {
                for (const spec of this.manualFieldSpecs) {
                    const value = this.manualFields[spec.key];
                    const empty = Array.isArray(value)
                        ? value.length === 0
                        : value === undefined || value === null || value === '';
                    if (spec.required && empty) return false;
                    // Enforce min_value for number fields
                    if (spec.type === 'number' && spec.min_value != null && typeof value === 'number' && value < spec.min_value) return false;
                }
            }
            if (!this.manualPurchasedPrice || this.manualPurchasedPrice <= 0) return false;
            if (this.credentials.length === 0) return false;
            const cols = this.credentialColumns;
            const valid = this.credentials.every(c => c[cols[0].key] && c[cols[1].key]);
            if (!valid) return false;
            if (this.distributionMode === 'shared' && this.totalDistributed > this.credentials.length) return false;
            return true;
        },

        get supportedProviders() {
            if (!this.selectedGame) return null;  // null = no filter, show all
            return GAME_PROVIDERS[this.selectedGame] || [];
        },

        isStoreSupported(provider) {
            const providers = this.supportedProviders;
            if (providers === null) return true;  // no game selected, all enabled
            return providers.includes(provider);
        },

        get gameVariants() {
            const slug = GAME_SLUGS[this.selectedGame] || '';
            return GAME_VARIANTS[slug] || [];
        },

        get isGtaGame() {
            const slug = (GAME_SLUGS[this.selectedGame] || '').toLowerCase();
            return slug.startsWith('gta') || slug.includes('grand-theft-auto');
        },

        get isFortniteGame() {
            const slug = (GAME_SLUGS[this.selectedGame] || '').toLowerCase();
            return slug === 'fortnite' || slug === 'fn';
        },

        get isR6Game() {
            const slug = (GAME_SLUGS[this.selectedGame] || '').toLowerCase();
            return slug === 'rainbow-six-siege' || slug === 'r6' || slug === 'r6s';
        },

        get hasSheetMode() {
            return this.isFortniteGame || this.isR6Game;
        },

        get manualFieldGroups() {
            const seen = new Set();
            const groups = [];
            for (const spec of this.manualFieldSpecs) {
                const g = spec.group || '';
                if (!seen.has(g)) { seen.add(g); groups.push(g); }
            }
            return groups;
        },

        manualScalarFieldsByGroup(group) {
            return this.manualFieldSpecs.filter(s => (s.group || '') === group && s.type !== 'multiselect');
        },

        manualMultiselectFieldsByGroup(group) {
            return this.manualFieldSpecs.filter(s => (s.group || '') === group && s.type === 'multiselect');
        },

        toggleManualFieldTag(key, value) {
            if (!this.manualFields[key]) this.manualFields[key] = [];
            const arr = this.manualFields[key];
            const idx = arr.indexOf(value);
            if (idx === -1) arr.push(value);
            else arr.splice(idx, 1);
        },

        get canAutoGenerateMedia() {
            return this.sourceType === 'manual' && Boolean(this.mediaCapabilities.auto_generate_manual);
        },

        get isImageOptional() {
            return this.sourceType !== 'manual';
        },

        get selectedImagePresetPayload() {
            if (!this.mediaCapabilities.supports_override) return null;
            if (!this.selectedImagePresetId || this.selectedImagePresetId === 'auto') return null;
            const presetId = Number(this.selectedImagePresetId);
            return Number.isInteger(presetId) && presetId > 0 ? presetId : null;
        },

        // --- GTA Live Preview computed properties ---

        get previewTitle() {
            if (!this.isGtaGame) return '';
            if (this.manualTitle && this.manualTitle !== 'GTA V Account') return this.manualTitle;
            const parts = ['GTA V'];
            if (this.manualLevel) parts.push('Lv' + this.manualLevel);
            if (this.manualCashAmount) parts.push(this.manualCashAmount + ' ' + this.manualCashUnit + ' Cash');
            if (this.manualPlatform) parts.push(this.manualPlatform);
            // Join with | respecting 160 char limit
            let result = '';
            const used = [];
            for (const part of parts) {
                const candidate = used.length === 0 ? part : result + ' | ' + part;
                if (candidate.length > 160) break;
                result = candidate;
                used.push(part);
            }
            return result;
        },

        get previewDescription() {
            if (!this.isGtaGame) return '';
            const lines = ['GTA V Account', '---------------------------'];
            if (this.manualPlatform) lines.push('Platform: ' + this.manualPlatform);
            if (this.manualLevel) lines.push('Level: ' + this.manualLevel);
            if (this.manualCashAmount) lines.push('Cash: ' + this.manualCashAmount + ' ' + this.manualCashUnit);
            if (this.manualCarsCount) lines.push('Cars: ' + this.manualCarsCount);
            if (this.manualAccountTags.length > 0) lines.push('Tags: ' + this.manualAccountTags.join(', '));
            if (this.manualDescription) { lines.push(''); lines.push(this.manualDescription); }
            return lines.join('\n');
        },

        get previewImageLabel() {
            if (this.selectedImagePresetId === 'auto') return 'Auto Generated';
            const preset = this.imagePresets.find(p => String(p.id) === this.selectedImagePresetId);
            return preset ? (preset.name || 'Saved Image') : 'No image selected';
        },

        get previewImageUrl() {
            if (this.selectedImagePresetId === 'auto' || this.selectedImagePresetId === '') return '';
            const preset = this.imagePresets.find(p => String(p.id) === this.selectedImagePresetId);
            return preset ? preset.url : '';
        },

        get selectedStoreNames() {
            return this.selectedStores.map(id => STORE_NAMES[id] || id).join(', ');
        },

        get platformOptions() {
            if (this.isGtaGame) return GTA_PLATFORMS;
            return this.gameVariants.length > 0 ? this.gameVariants : [];
        },

        get totalDistributed() {
            let total = 0;
            for (const slug of Object.keys(this.distribution)) {
                total += (parseInt(this.distribution[slug]) || 0);
            }
            return total;
        },

        init() {
            {% for store in stores %}
            if (!this.defaults['{{ store.slug }}']) {
                this.defaults['{{ store.slug }}'] = {
                    multiplier_low: '2.00', multiplier_mid: '1.80', multiplier_high: '1.50',
                    min_price: '0.00', forced_ending: '0.99',
                    {% if store.provider == 'gameboost' %}exchange_rate: '0.87',{% endif %}
                    variant: '', account_type: '',
                    title_template_id: null, description_template_id: null,
                    {% if store.provider == 'playerauctions' %}pa_mode: 'single',{% endif %}
                };
            }
            this.showSettings['{{ store.slug }}'] = false;
            this.distribution['{{ store.slug }}'] = 0;
            {% endfor %}

            if (this.selectedGame) this.onGameChange();

            // Sheet mode: force multipliers to 1.0 when accounts have sales_price
            this.$watch('sheetHasSalesPrice', (val) => {
                if (val) {
                    this._forceSheetMultipliers();
                }
            });
            this.$watch('sourceType', () => {
                if (this.selectedImagePresetId === 'auto' && !this.canAutoGenerateMedia) {
                    this.selectedImagePresetId = '';
                } else if (!this.selectedImagePresetId && this.canAutoGenerateMedia) {
                    this.selectedImagePresetId = 'auto';
                }
            });
        },

        async onGameChange() {
            // Deselect stores that don't support the newly selected game
            if (this.selectedGame && this.supportedProviders !== null) {
                const STORE_PROVIDERS = {
                    {% for store in stores %}'{{ store.id }}': '{{ store.provider }}',{% endfor %}
                };
                this.selectedStores = this.selectedStores.filter(
                    id => this.isStoreSupported(STORE_PROVIDERS[id])
                );
            }
            // Reset sheet mode if switching away from supported game
            if (this.sourceType === 'sheet' && !this.isFortniteGame) {
                this.sourceType = 'account';
            }
            if (this.sourceType === 'r6_sheet' && !this.isR6Game) {
                this.sourceType = 'account';
            }
            if (!this.selectedGame) {
                this.selectedImagePresetId = '';
                this.imagePresets = [];
                this.imageError = '';
                this.manualFieldSpecs = [];
                this.manualFields = {};
                return;
            }
            // Reset dynamic manual fields
            this.manualFieldSpecs = [];
            this.manualFields = {};
            for (const slug of Object.keys(this.defaults)) {
                this.defaults[slug].variant = '';
                this.defaults[slug].title_template_id = null;
                this.defaults[slug].description_template_id = null;
            }
            this.templatesByMarketplace = {};

            // Fetch defaults + templates in parallel
            const providers = new Set();
            {% for store in stores %}
            providers.add('{{ store.provider }}');
            {% endfor %}

            const defaultsPromises = Array.from(providers).map(async (provider) => {
                try {
                    const resp = await fetch(`/posting/api/defaults/${this.selectedGame}/${provider}/`);
                    if (resp.ok) {
                        const data = await resp.json();
                        {% for store in stores %}
                        if ('{{ store.provider }}' === provider && this.defaults['{{ store.slug }}']) {
                            this.defaults['{{ store.slug }}'] = { ...this.defaults['{{ store.slug }}'], ...data };
                        }
                        {% endfor %}
                    }
                } catch (e) {}
            });

            const templatesPromise = (async () => {
                try {
                    const resp = await fetch(`/posting/api/content-templates/?game_id=${this.selectedGame}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        const byMp = {};
                        for (const t of data.templates || []) {
                            if (!byMp[t.marketplace]) byMp[t.marketplace] = { title: [], description: [] };
                            byMp[t.marketplace][t.template_type].push(t);
                        }
                        this.templatesByMarketplace = byMp;
                    }
                } catch (e) {}
            })();

            const manualFieldsPromise = (async () => {
                if (this.isGtaGame) return;  // GTA uses legacy hardcoded fields
                try {
                    const resp = await fetch(`/posting/api/manual-fields/?game_id=${encodeURIComponent(this.selectedGame)}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        this.manualFieldSpecs = data.fields || [];
                        // Initialize manualFields with defaults
                        const fields = {};
                        for (const spec of this.manualFieldSpecs) {
                            if (spec.type === 'multiselect') {
                                fields[spec.key] = Array.isArray(spec.default) ? [...spec.default] : [];
                            } else if (spec.default !== undefined && spec.default !== null) {
                                fields[spec.key] = spec.default;
                            } else {
                                fields[spec.key] = spec.type === 'number' ? 0 : spec.type === 'boolean' ? false : '';
                            }
                        }
                        this.manualFields = fields;
                    }
                } catch (e) {}
            })();

            await Promise.all([...defaultsPromises, templatesPromise, manualFieldsPromise]);

            // Re-apply forced multipliers if sheet mode with sales_price
            if (this.sheetHasSalesPrice) {
                this._forceSheetMultipliers();
            }
            this.imageError = '';
            this.mediaCapabilities = { auto_generate_manual: false, supports_override: true };
            this.selectedImagePresetId = '';
            if (this.selectedGame) {
                // Fetch capabilities and presets in parallel
                const [, capsResp] = await Promise.all([
                    this.loadImagePresets(),
                    fetch(`/posting/api/media-capabilities/?game_id=${encodeURIComponent(this.selectedGame)}`).then(r => r.ok ? r.json() : null).catch(() => null),
                ]);
                if (capsResp) {
                    this.mediaCapabilities = capsResp;
                }
                this.selectedImagePresetId = this.defaultImageSelection();
            } else {
                this.imagePresets = [];
            }
        },

        defaultImageSelection() {
            return this.canAutoGenerateMedia ? 'auto' : '';
        },

        _forceSheetMultipliers() {
            for (const slug of Object.keys(this.defaults)) {
                this.defaults[slug].multiplier_low = '1.00';
                this.defaults[slug].multiplier_mid = '1.00';
                this.defaults[slug].multiplier_high = '1.00';
            }
        },

        onStoreToggle(slug) {},

        toggleTag(tag) {
            const idx = this.manualAccountTags.indexOf(tag);
            if (idx === -1) this.manualAccountTags.push(tag);
            else this.manualAccountTags.splice(idx, 1);
        },

        toggleSettings(slug) {
            this.showSettings[slug] = !this.showSettings[slug];
        },

        async loadImagePresets() {
            if (!this.selectedGame) return;
            this.imageLoading = true;
            this.imageError = '';
            try {
                const resp = await fetch(`/posting/api/image-presets/?game_id=${encodeURIComponent(this.selectedGame)}`);
                const data = await resp.json();
                if (!resp.ok) {
                    this.imageError = data.error || 'Failed to load images';
                    return;
                }
                this.imagePresets = data.presets || [];
            } catch (e) {
                this.imageError = 'Network error: ' + e.message;
            } finally {
                this.imageLoading = false;
            }
        },

        async uploadImage(event) {
            const file = event.target.files && event.target.files[0];
            if (!file || !this.selectedGame) return;

            this.imageUploading = true;
            this.imageError = '';
            const form = new FormData();
            form.append('game_id', this.selectedGame);
            form.append('image', file);
            form.append('name', file.name.replace(/\.[^.]+$/, ''));

            try {
                const resp = await fetch('/posting/api/image-presets/upload/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                    body: form,
                });
                const data = await resp.json();
                if (!resp.ok) {
                    this.imageError = data.error || 'Failed to upload image';
                    return;
                }

                const preset = data.preset;
                if (preset) {
                    const idx = this.imagePresets.findIndex(p => p.id === preset.id);
                    if (idx >= 0) this.imagePresets.splice(idx, 1, preset);
                    else this.imagePresets.unshift(preset);
                    this.selectedImagePresetId = String(preset.id);
                }
            } catch (e) {
                this.imageError = 'Network error: ' + e.message;
            } finally {
                this.imageUploading = false;
                event.target.value = '';
            }
        },

        async deleteImagePreset(presetId) {
            if (!confirm('Delete this image?')) return;
            this.imageError = '';
            try {
                const resp = await fetch(`/posting/api/image-presets/${presetId}/delete/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    this.imageError = data.error || 'Failed to delete image';
                    return;
                }
                this.imagePresets = this.imagePresets.filter(p => p.id !== presetId);
                if (this.selectedImagePresetId === String(presetId)) {
                    this.selectedImagePresetId = this.defaultImageSelection();
                }
            } catch (e) {
                this.imageError = 'Network error: ' + e.message;
            }
        },

        // --- Manual credential handling ---

        handlePaste(event) {
            // Let the paste happen naturally, user clicks Parse after
        },

        parsePaste() {
            if (!this.pasteData.trim()) return;
            const lines = this.pasteData.trim().split('\n');
            if (lines.length === 0) return;

            const spec = this.credentialSpec;

            // Detect if first line is a header
            const headerKeys = spec
                ? spec.map(c => c.label.toLowerCase())
                : ['login', 'password', 'email', 'birthday'];
            const firstCells = lines[0].split('\t');
            const isHeader = firstCells.some(c =>
                headerKeys.includes(c.trim().toLowerCase())
            );
            const dataLines = isHeader ? lines.slice(1) : lines;

            for (const line of dataLines) {
                if (!line.trim()) continue;
                const cells = line.split('\t');
                this.credentials.push(
                    spec ? parseBySpec(cells, spec) : detectColumns(cells)
                );
            }
            this.pasteData = '';
        },

        addEmptyRow() {
            const spec = this.credentialSpec;
            this.credentials.push(
                spec ? emptyCredentialForSpec(spec) : emptyCredential()
            );
        },

        handleCellPaste(event, rowIdx, colIdx) {
            const text = (event.clipboardData || window.clipboardData).getData('text');
            if (!text) return;

            const cols = this.credentialColumns;
            const spec = this.credentialSpec;
            const lines = text.split('\n').filter(l => l.trim());

            // Single value (no tabs, no newlines) → just fill the current cell
            if (lines.length === 1 && !lines[0].includes('\t')) {
                this.credentials[rowIdx][cols[colIdx].key] = lines[0].trim();
                return;
            }

            // Multi-cell paste (Excel/Sheets style)
            for (let r = 0; r < lines.length; r++) {
                const cells = lines[r].split('\t');
                const targetRow = rowIdx + r;

                // Add new rows if needed
                while (targetRow >= this.credentials.length) {
                    this.credentials.push(
                        spec ? emptyCredentialForSpec(spec) : emptyCredential()
                    );
                }

                // Fill from colIdx onward
                for (let c = 0; c < cells.length; c++) {
                    const targetCol = colIdx + c;
                    if (targetCol < cols.length) {
                        this.credentials[targetRow][cols[targetCol].key] = cells[c].trim();
                    }
                }

                // Date fix for this row
                if (spec) {
                    const cred = this.credentials[targetRow];
                    const dobCol = spec.find(s => s.key === 'dob');
                    if (dobCol && !cred.dob) {
                        for (const col of spec) {
                            if (col.key === 'dob') continue;
                            if (cred[col.key] && DATE_RE.test(cred[col.key])) {
                                cred.dob = cred[col.key];
                                cred[col.key] = '';
                                break;
                            }
                        }
                    }
                }
            }
        },

        // --- Preview & Submit ---

        _buildPayload() {
            const storeIds = this.selectedStores.map(Number);
            const defaultsPayload = {};
            {% for store in stores %}
            if (storeIds.includes({{ store.id }})) {
                const slug = '{{ store.slug }}';
                if (this.defaults[slug]) defaultsPayload[slug] = this.defaults[slug];
            }
            {% endfor %}

            if (this.sourceType === 'account') {
                const loginList = this.logins.split('\n').filter(l => l.trim()).map(l => l.trim());
                return {
                    source_type: 'account',
                    game_id: Number(this.selectedGame),
                    logins: loginList,
                    stores: storeIds,
                    defaults: defaultsPayload,
                    source_account_id: this.sourceAccountId ? Number(this.sourceAccountId) : null,
                    selected_image_preset_id: this.selectedImagePresetPayload,
                };
            }

            if (this.sourceType === 'sheet') {
                return {
                    source_type: 'sheet',
                    game_id: Number(this.selectedGame),
                    stores: storeIds,
                    defaults: defaultsPayload,
                    accounts: this.sheetAccounts,
                    has_sales_price: this.sheetHasSalesPrice,
                    selected_image_preset_id: this.selectedImagePresetPayload,
                };
            }

            if (this.sourceType === 'r6_sheet') {
                return {
                    source_type: 'r6_sheet',
                    game_id: Number(this.selectedGame),
                    stores: storeIds,
                    defaults: defaultsPayload,
                    accounts: this.sheetAccounts,
                    has_sales_price: this.sheetHasSalesPrice,
                    selected_image_preset_id: this.selectedImagePresetPayload,
                };
            }

            // Manual mode
            const distrib = {};
            if (this.distributionMode === 'shared') {
                {% for store in stores %}
                if (storeIds.includes({{ store.id }})) {
                    distrib['{{ store.slug }}'] = parseInt(this.distribution['{{ store.slug }}']) || 0;
                }
                {% endfor %}
            }
            const payload = {
                source_type: 'manual',
                game_id: Number(this.selectedGame),
                stores: storeIds,
                defaults: defaultsPayload,
                title: this.manualTitle || null,
                description: this.manualDescription || null,
                purchased_price: this.manualPurchasedPrice,
                platform: this.manualPlatform,
                level: this.manualLevel,
                cash_amount: this.manualCashAmount,
                cash_unit: this.manualCashUnit,
                cars_count: this.manualCarsCount,
                account_tags: this.manualAccountTags,
                has_dual_characters: this.manualHasDualCharacters,
                selected_image_preset_id: this.selectedImagePresetPayload,
                credentials: this.credentials,
                distribution_mode: this.distributionMode,
                distribution: distrib,
            };
            // Include dynamic game-specific fields (non-GTA)
            if (!this.isGtaGame && Object.keys(this.manualFields).length > 0) {
                payload.manual_fields = { ...this.manualFields };
            }
            // Include pool creation config if enabled
            if (this.createPoolEnabled && this.poolName.trim()) {
                payload.pool_config = {
                    name: this.poolName.trim(),
                    target_count: this.poolTargetCount,
                    threshold: this.poolThreshold,
                };
            }
            return payload;
        },

        // --- Google Sheet (Fortnite) methods ---
        _parseSpreadsheetId(input) {
            input = input.trim();
            // Extract ID from URL: https://docs.google.com/spreadsheets/d/{ID}/...
            const match = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
            if (match) return match[1];
            // Already an ID (no slashes)
            if (!input.includes('/')) return input;
            return '';
        },

        async prepareFortniteSheet() {
            const ssId = this._parseSpreadsheetId(this.sheetSpreadsheetInput);
            if (!ssId) {
                this.sheetError = 'Invalid spreadsheet ID or URL.';
                return;
            }
            this.sheetLoading = true;
            this.sheetError = '';
            this.sheetSuccess = '';
            try {
                const resp = await fetch('/posting/api/manual/fortnite/sheet/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}',
                    },
                    body: JSON.stringify({
                        spreadsheet_id: ssId,
                        sheet_name: this.sheetWorksheetName.trim() || 'FORTNITE MANUAL',
                    }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    this.sheetError = data.error || 'Failed to prepare sheet';
                } else {
                    this.sheetSpreadsheetId = ssId;
                    this.sheetUrl = data.url;
                    this.sheetSuccess = data.message || 'Sheet ready! Fill in your accounts and click Fetch.';
                    if (data.url) window.open(data.url, '_blank');
                }
            } catch (e) {
                this.sheetError = 'Network error: ' + e.message;
            } finally {
                this.sheetLoading = false;
            }
        },

        async fetchSheetAccounts() {
            // Allow direct fetch without prepare — parse ID from input if needed
            const ssId = this.sheetSpreadsheetId || this._parseSpreadsheetId(this.sheetSpreadsheetInput);
            if (!ssId) {
                this.sheetError = 'Enter a spreadsheet ID or URL first.';
                return;
            }
            this.sheetSpreadsheetId = ssId;
            this.sheetFetching = true;
            this.sheetError = '';
            this.sheetSuccess = '';
            this.sheetFetchErrors = [];
            try {
                const wsName = this.sheetWorksheetName.trim() || 'FORTNITE MANUAL';
                const resp = await fetch(`/posting/api/manual/fortnite/accounts/?spreadsheet_id=${encodeURIComponent(ssId)}&sheet_name=${encodeURIComponent(wsName)}`, {
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                });
                const data = await resp.json();
                if (!resp.ok) {
                    this.sheetError = data.error || 'Failed to fetch accounts';
                } else {
                    this.sheetAccounts = data.accounts || [];
                    this.sheetFetchErrors = data.errors || [];
                }
            } catch (e) {
                this.sheetError = 'Network error: ' + e.message;
            } finally {
                this.sheetFetching = false;
            }
        },

        async prepareR6Sheet() {
            const ssId = this._parseSpreadsheetId(this.sheetSpreadsheetInput);
            if (!ssId) {
                this.sheetError = 'Invalid spreadsheet ID or URL.';
                return;
            }

            this.sheetError = '';

                const resp = await fetch('/posting/api/manual/r6/sheet/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}',
                    },
                    body: JSON.stringify({

                    }),
                });

                if (!resp.ok) {
                    this.sheetError = data.error || 'Failed to prepare sheet';
                } else {
                    this.sheetSpreadsheetId = ssId;
                    this.sheetUrl = data.url;
                    this.sheetSuccess = data.message || 'Sheet ready! Fill in your accounts and click Fetch.';
                    if (data.url) window.open(data.url, '_blank');
                }
            } catch (e) {
                this.sheetError = 'Network error: ' + e.message;
            } finally {
                this.sheetLoading = false;
            }
        },

        async fetchR6Accounts() {
            const ssId = this.sheetSpreadsheetId || this._parseSpreadsheetId(this.sheetSpreadsheetInput);
            if (!ssId) {
                this.sheetError = 'Enter a spreadsheet ID or URL first.';
                return;
            }
            this.sheetSpreadsheetId = ssId;
            this.sheetFetching = true;
            this.sheetError = '';
            this.sheetSuccess = '';
            this.sheetFetchErrors = [];
            try {
                const wsName = this.sheetWorksheetName.trim() || 'R6 TRACKER';
                const resp = await fetch(`/posting/api/manual/r6/accounts/?spreadsheet_id=${encodeURIComponent(ssId)}&sheet_name=${encodeURIComponent(wsName)}`, {
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                });
                const data = await resp.json();
                if (!resp.ok) {
                    this.sheetError = data.error || 'Failed to fetch accounts';
                } else {
                    this.sheetAccounts = data.accounts || [];
                    this.sheetFetchErrors = data.errors || [];
                }
            } catch (e) {
                this.sheetError = 'Network error: ' + e.message;
            } finally {
                this.sheetFetching = false;
            }
        },

        async submitJob() {
            this.submitting = true;
            this.submitError = '';

            const body = this._buildPayload();

            try {
                const resp = await fetch('/posting/api/jobs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}',
                    },
                    body: JSON.stringify(body),
                });

                const data = await resp.json();

                if (!resp.ok) {
                    this.submitError = data.error || 'Failed to create job';
                    this.submitting = false;
                    return;
                }

                window.location.href = '/posting/stock/active/';
            } catch (e) {
                this.submitError = 'Network error: ' + e.message;
                this.submitting = false;
            }
        },

    };
}
