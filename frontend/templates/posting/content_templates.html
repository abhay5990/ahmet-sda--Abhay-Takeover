{% extends "base.html" %}

{% block title %}Content Templates{% endblock %}

{% block content %}
<div x-data="contentTemplates()" x-init="init()" class="space-y-6">

    <!-- Header -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Content Templates</h1>
            <p class="mt-1 text-sm text-gray-500">Manage title and description templates for your listings.</p>
        </div>
        <div class="flex gap-2">
            <a href="/posting/templates/cosmetic-lists/"
               class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200 inline-block">
                Cosmetic Lists
            </a>
            <a :href="selectedGame ? '/posting/templates/editor/?game_id=' + selectedGame : '/posting/templates/editor/'"
               class="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700 inline-block">
                + New Template
            </a>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Game</label>
                <select x-model="selectedGame" @change="onGameChange()"
                        class="w-full rounded-md border-gray-300 text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="">All Games</option>
                    <template x-for="game in games" :key="game.id">
                        <option :value="String(game.id)" x-text="game.name"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Marketplace</label>
                <select x-model="filterMarketplace" @change="loadTemplates()"
                        class="w-full rounded-md border-gray-300 text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="">All Marketplaces</option>
                    <template x-for="mp in marketplaces" :key="mp[0]">
                        <option :value="mp[0]" x-text="mp[1]"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Type</label>
                <select x-model="filterType" @change="loadTemplates()"
                        class="w-full rounded-md border-gray-300 text-sm focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="">All Types</option>
                    <template x-for="tt in templateTypes" :key="tt[0]">
                        <option :value="tt[0]" x-text="tt[1]"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">&nbsp;</label>
                <div class="flex h-[38px] items-center rounded-md border border-gray-200 bg-gray-50 px-3 text-sm">
                    <span x-show="loading" class="text-gray-400">Loading...</span>
                    <span x-show="!loading" class="text-gray-600">
                        <span class="font-medium" x-text="templates.length"></span> template(s)
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <template x-if="errorMessage">
        <div class="rounded-md border border-red-200 bg-red-50 p-3 text-sm text-red-700" x-text="errorMessage"></div>
    </template>
    <template x-if="statusMessage">
        <div class="rounded-md border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-700" x-text="statusMessage"></div>
    </template>

    <!-- Empty: no templates found -->
    <template x-if="!loading && templates.length === 0">
        <div class="bg-white rounded-lg shadow p-12 text-center">
            <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-gray-500 mb-3">No templates found</p>
            <a href="/posting/templates/editor/"
               class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Create your first template
            </a>
        </div>
    </template>

    <!-- Template Cards (mobile) -->
    <template x-if="!loading && templates.length > 0">
        <div>
            <!-- Mobile card layout -->
            <div class="space-y-3 lg:hidden">
                <template x-for="tpl in templates" :key="tpl.id">
                    <div class="bg-white rounded-lg shadow p-4">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <div class="min-w-0">
                                <h3 class="text-sm font-medium text-gray-900 truncate" x-text="tpl.name"></h3>
                                <p class="text-xs text-gray-500 mt-0.5" x-text="tpl.game_name"></p>
                            </div>
                            <div class="flex items-center gap-1 shrink-0">
                                <a :href="'/posting/templates/editor/' + tpl.id + '/'"
                                   class="p-1.5 rounded-md text-gray-400 hover:text-blue-600 hover:bg-blue-50" title="Edit">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </a>
                                <button @click="deleteTemplate(tpl)"
                                        class="p-1.5 rounded-md text-gray-400 hover:text-red-600 hover:bg-red-50" title="Delete">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-wrap items-center gap-1.5 mb-2">
                            <span class="inline-flex rounded-full px-2 py-0.5 text-[11px] font-medium"
                                  :class="tpl.template_type === 'title' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'"
                                  x-text="tpl.template_type"></span>
                            <span class="inline-flex rounded-full px-2 py-0.5 text-[11px] font-medium bg-gray-100 text-gray-600"
                                  x-text="getMarketplaceName(tpl.marketplace)"></span>
                            <span class="text-[11px] text-gray-400 ml-auto" x-text="formatDate(tpl.updated_at)"></span>
                        </div>
                        <pre class="text-xs text-gray-500 font-mono whitespace-pre-wrap break-words max-h-20 overflow-y-auto leading-relaxed bg-gray-50 rounded p-2" x-text="tpl.body"></pre>
                    </div>
                </template>
            </div>

            <!-- Desktop table layout -->
            <div class="bg-white rounded-lg shadow overflow-hidden hidden lg:block">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Game</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Marketplace</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Body</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Updated</th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-24">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="tpl in templates" :key="tpl.id">
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-4 py-3">
                                    <span class="text-sm font-medium text-gray-900" x-text="tpl.name"></span>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="text-sm text-gray-600" x-text="tpl.game_name"></span>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="inline-flex rounded-full px-2 py-0.5 text-[11px] font-medium"
                                          :class="tpl.template_type === 'title' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'"
                                          x-text="tpl.template_type"></span>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="text-sm text-gray-600" x-text="getMarketplaceName(tpl.marketplace)"></span>
                                </td>
                                <td class="px-4 py-3 max-w-md">
                                    <pre class="text-xs text-gray-500 font-mono whitespace-pre-wrap break-words max-h-16 overflow-y-auto leading-relaxed" x-text="tpl.body"></pre>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="text-xs text-gray-400 whitespace-nowrap" x-text="formatDate(tpl.updated_at)"></span>
                                </td>
                                <td class="px-4 py-3 text-right">
                                    <div class="flex items-center justify-end gap-1">
                                        <a :href="'/posting/templates/editor/' + tpl.id + '/'"
                                           class="p-1.5 rounded-md text-gray-400 hover:text-blue-600 hover:bg-blue-50"
                                           title="Edit">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                        </a>
                                        <button @click="deleteTemplate(tpl)"
                                                class="p-1.5 rounded-md text-gray-400 hover:text-red-600 hover:bg-red-50"
                                                title="Delete">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <!-- Loading -->
    <template x-if="loading">
        <div class="bg-white rounded-lg shadow p-5">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-48"></div>
                <div class="h-3 bg-gray-100 rounded w-full"></div>
                <div class="h-3 bg-gray-100 rounded w-full"></div>
                <div class="h-3 bg-gray-100 rounded w-2/3"></div>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block extra_js %}
<script>
const TEMPLATE_GAMES = {{ game_options_json|safe }};
const TEMPLATE_MARKETPLACES = {{ marketplace_options_json|safe }};
const TEMPLATE_TYPES = {{ template_type_options_json|safe }};

function contentTemplates() {
    return {
        games: TEMPLATE_GAMES,
        marketplaces: TEMPLATE_MARKETPLACES,
        templateTypes: TEMPLATE_TYPES,
        selectedGame: '',
        filterMarketplace: '',
        filterType: '',
        templates: [],
        loading: false,
        errorMessage: '',
        statusMessage: '',

        async init() {
            await this.loadTemplates();
        },

        async onGameChange() {
            this.filterMarketplace = '';
            this.filterType = '';
            await this.loadTemplates();
        },

        async loadTemplates() {
            this.loading = true;
            this.errorMessage = '';
            this.statusMessage = '';
            try {
                const params = new URLSearchParams();
                if (this.selectedGame) params.set('game_id', this.selectedGame);
                if (this.filterMarketplace) params.set('marketplace', this.filterMarketplace);
                if (this.filterType) params.set('template_type', this.filterType);
                const res = await fetch('/posting/api/content-templates/?' + params);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Could not load templates');
                this.templates = data.templates || [];
            } catch (e) {
                this.errorMessage = e.message;
            }
            this.loading = false;
        },

        getMarketplaceName(slug) {
            const mp = this.marketplaces.find(m => m[0] === slug);
            return mp ? mp[1] : slug;
        },

        async deleteTemplate(tpl) {
            if (!confirm(`Delete "${tpl.name}"?`)) return;
            this.errorMessage = '';
            try {
                const res = await fetch(`/posting/api/content-templates/${tpl.id}/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': this.getCsrf() },
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Delete failed');
                this.statusMessage = 'Template deleted';
                await this.loadTemplates();
            } catch (e) {
                this.errorMessage = e.message;
            }
        },

        formatDate(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        },

        getCsrf() {
            return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
        },
    };
}
</script>
{% endblock %}
