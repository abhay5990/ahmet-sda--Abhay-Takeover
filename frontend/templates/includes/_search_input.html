{# Search input with magnifying glass icon. Params: placeholder, value #}
<div class="flex-1 min-w-[200px] max-w-xs relative">
    <input type="text" name="q" value="{{ value }}" placeholder="{{ placeholder }}"
           class="w-full border-gray-300 rounded-md text-sm pl-9 focus:ring-emerald-500 focus:border-emerald-500"
           onkeydown="if(event.key==='Enter')this.form.submit()">
    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
</div>
