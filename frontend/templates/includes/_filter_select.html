<select name="{{ name }}" onchange="this.form.submit()"
        class="border-gray-300 rounded-md text-sm focus:ring-emerald-500 focus:border-emerald-500">
    <option value="">{{ default_label }}</option>
    {% if grouped_options %}
        {% for group in grouped_options %}
        <optgroup label="{{ group.grouper|title }}">
            {% for item in group.list %}
            <option value="{{ item.id }}" {% if selected == item.id|stringformat:"d" %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </optgroup>
        {% endfor %}
    {% elif is_object %}
        {% for opt in options %}
        <option value="{{ opt.id }}" {% if selected == opt.id|stringformat:"d" %}selected{% endif %}>{{ opt.name }}</option>
        {% endfor %}
    {% else %}
        {% for opt in options %}
        <option value="{{ opt.0 }}" {% if selected == opt.0 %}selected{% endif %}>{{ opt.1 }}</option>
        {% endfor %}
    {% endif %}
</select>
