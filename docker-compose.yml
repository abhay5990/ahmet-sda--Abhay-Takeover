version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: inventory_manager_db
    restart: always
    environment:
      MYSQL_DATABASE: inventory_manager
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-devpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: inventory_manager_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "8082:80"
    depends_on:
      - db

volumes:
  mysql_data:
